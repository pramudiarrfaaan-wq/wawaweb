<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Zodiak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
    <h1>🔮 Tarot Reading</h1>
    <p>Pilih satu kartu untuk melihat ramalanmu hari ini</p>
</div>

<!-- KARTU TAROT -->
<div class="container">

    <div class="card" onclick="bukaKartu(this, 'cinta')">
        <div class="inner">
            <div class="front">🃏</div>
            <div class="back">❤️ Cinta</div>
        </div>
    </div>

    <div class="card" onclick="bukaKartu(this, 'karir')">
        <div class="inner">
            <div class="front">🃏</div>
            <div class="back">💼 Karir</div>
        </div>
    </div>

    <div class="card" onclick="bukaKartu(this, 'keuangan')">
        <div class="inner">
            <div class="front">🃏</div>
            <div class="back">💰 Keuangan</div>
        </div>
    </div>

</div>

<!-- HASIL -->
<div id="hasil" class="hasil"></div>

<script src="script.js"></script>
</body>
</html>
